  <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WDR+E — the not only paper computer</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/editor/editor.main.css" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
      background: #1e1e2e;
      color: #cdd6f4;
    }

    /* ─── Mode navigation ────────────────────────────── */
    #mode-nav {
      display: flex;
      align-items: stretch;
      background: #11111b;
      border-bottom: 2px solid #313244;
      padding: 0 8px;
      flex: 0 0 auto;
      position: relative;
    }
    #mode-nav > button {
      font-family: inherit;
      font-size: 13px;
      padding: 10px 18px;
      border: none;
      background: transparent;
      color: #6c7086;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: color .15s, border-color .15s;
    }
    #mode-nav > button:hover { color: #cdd6f4; }
    #mode-nav > button.active {
      color: #89b4fa;
      border-bottom-color: #89b4fa;
    }

    /* ─── Category dropdown ───────────────────────────── */
    .nav-dropdown {
      position: relative;
      display: flex;
      align-items: stretch;
    }
    .nav-dropdown-toggle {
      font-family: inherit;
      font-size: 13px;
      padding: 10px 18px;
      border: none;
      background: transparent;
      color: #6c7086;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: color .15s, border-color .15s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .nav-dropdown-toggle:hover { color: #cdd6f4; }
    .nav-dropdown-toggle.has-selection {
      color: #89b4fa;
      border-bottom-color: #89b4fa;
    }
    .nav-dropdown-arrow {
      font-size: 10px;
      transition: transform .2s;
    }
    .nav-dropdown.open .nav-dropdown-arrow {
      transform: rotate(180deg);
    }
    .nav-dropdown-menu {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      min-width: 260px;
      max-height: 70vh;
      overflow-y: auto;
      background: #1e1e2e;
      border: 1px solid #313244;
      border-top: none;
      border-radius: 0 0 8px 8px;
      box-shadow: 0 8px 24px rgba(0,0,0,.4);
      z-index: 1000;
      padding: 6px 0;
    }
    .nav-dropdown.open .nav-dropdown-menu {
      display: block;
    }
    .nav-cat-header {
      padding: 8px 14px 4px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: #585b70;
      user-select: none;
    }
    .nav-cat-separator {
      height: 1px;
      background: #313244;
      margin: 4px 12px;
    }
    .nav-cat-sublabel {
      padding: 6px 14px 2px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .04em;
      color: #45475a;
      user-select: none;
    }
    .nav-item {
      display: flex;
      align-items: center;
      width: 100%;
      padding: 7px 14px 7px 20px;
      border: none;
      background: transparent;
      color: #bac2de;
      font-family: inherit;
      font-size: 13px;
      cursor: pointer;
      text-align: left;
      gap: 8px;
      transition: background .1s, color .1s;
    }
    .nav-item:hover:not(.locked) {
      background: #313244;
      color: #cdd6f4;
    }
    .nav-item.active {
      background: #89b4fa22;
      color: #89b4fa;
      font-weight: 600;
    }
    .nav-item.completed {
      color: #a6e3a1;
    }
    .nav-item.completed.active {
      background: #a6e3a122;
      color: #a6e3a1;
    }
    .nav-item.locked {
      color: #45475a;
      cursor: not-allowed;
    }
    .nav-item-icon {
      width: 18px;
      text-align: center;
      flex: 0 0 auto;
      font-size: 12px;
    }

    /* ─── Main layout ────────────────────────────────── */
    #root {
      display: flex;
      flex: 1;
      min-height: 0;
      width: 100%;
    }
    .panel-editor {
      flex: 0 0 50%;
      height: 100%;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #313244;
    }
    .panel-editor .toolbar {
      flex: 0 0 auto;
      padding: 8px 12px;
      background: #181825;
      border-bottom: 1px solid #313244;
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .panel-editor .toolbar button {
      font-family: inherit;
      font-size: 13px;
      padding: 6px 14px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: #45475a;
      color: #cdd6f4;
    }
    .panel-editor .toolbar button:hover {
      background: #585b70;
    }
    .panel-editor .toolbar button.primary {
      background: #89b4fa;
      color: #1e1e2e;
    }
    .panel-editor .toolbar button.primary:hover {
      background: #b4befe;
    }
    .editor-area {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      position: relative;
    }
    .editor-area .code-wrap,
    .editor-area .blocks-wrap {
      position: absolute;
      inset: 0;
      display: none;
    }
    .editor-area .code-wrap.active,
    .editor-area .blocks-wrap.active {
      display: flex;
      flex-direction: column;
    }
    .editor-area .monaco-wrap {
      flex: 1;
      min-height: 0;
    }
    #monaco-editor {
      width: 100%;
      height: 100%;
    }
    #blockly-workspace {
      width: 100%;
      height: 100%;
    }
    .toolbar .mode-toggle {
      display: flex;
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid #313244;
    }
    .toolbar .mode-toggle button {
      border-radius: 0;
      border: none;
      margin: 0;
      padding: 6px 12px;
      font-size: 12px;
    }
    .toolbar .mode-toggle button.active {
      background: #89b4fa;
      color: #1e1e2e;
    }

    /* ─── Blockly overrides ──────────────────────────── */
    .blocklyToolboxCategoryName {
      color: #f5f5f7 !important;
      font-weight: 600;
      text-shadow: 0 0 1px rgba(0,0,0,0.5);
    }
    .blocklyToolboxCategory {
      background-color: #313244 !important;
    }
    .blocklyTreeRow {
      color: #e6e6ea !important;
    }
    .blocklyFlyoutBackground { fill: #313244; }
    .blocklyMainBackground { fill: #1e1e2e; }
    .blocklyScrollbarHandle { fill: #45475a; }

    /* ─── Right panel (state) ────────────────────────── */
    .panel-state {
      flex: 0 0 50%;
      height: 100%;
      display: flex;
      flex-direction: column;
      min-width: 0;
      overflow: hidden;
    }

    /* ─── Exercise panel ─────────────────────────────── */
    #exercise-panel {
      display: none;
      flex-direction: column;
      border-bottom: 1px solid #313244;
      overflow-y: auto;
      flex: 0 1 auto;
      max-height: 55%;
    }
    #exercise-panel.visible {
      display: flex;
    }
    .ex-header {
      padding: 10px 14px;
      background: #181825;
      border-bottom: 1px solid #313244;
    }
    .ex-header h3 {
      margin: 0 0 2px 0;
      font-size: 14px;
      color: #89b4fa;
      font-weight: 600;
    }
    .ex-goal {
      color: #f9e2af;
      font-size: 13px;
      font-weight: 500;
    }
    .ex-body {
      padding: 10px 14px;
      font-size: 12px;
      line-height: 1.6;
      white-space: pre-line;
      color: #bac2de;
    }
    .ex-available {
      padding: 6px 14px 10px;
      font-size: 12px;
      color: #6c7086;
    }
    .ex-available code {
      background: #313244;
      color: #cdd6f4;
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 11px;
      margin: 0 2px;
    }
    .ex-actions {
      padding: 8px 14px;
      display: flex;
      gap: 8px;
      align-items: center;
      border-top: 1px solid #313244;
      background: #181825;
    }
    .ex-actions button {
      font-family: inherit;
      font-size: 13px;
      padding: 6px 14px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: #45475a;
      color: #cdd6f4;
    }
    .ex-actions button:hover { background: #585b70; }
    .ex-actions button.primary {
      background: #a6e3a1;
      color: #1e1e2e;
      font-weight: 600;
    }
    .ex-actions button.primary:hover { background: #94e2d5; }
    .ex-hint-count {
      font-size: 11px;
      color: #6c7086;
      margin-left: 2px;
    }
    #ex-hints {
      padding: 0 14px;
    }
    .hint-box {
      margin: 6px 0;
      padding: 8px 12px;
      background: #313244;
      border-radius: 6px;
      font-size: 12px;
      line-height: 1.5;
      white-space: pre-line;
      color: #f9e2af;
      border-left: 3px solid #f9e2af;
    }
    #test-results {
      padding: 8px 14px 12px;
    }
    .test-line {
      padding: 3px 0;
      font-size: 12px;
    }
    .test-line.pass { color: #a6e3a1; }
    .test-line.fail { color: #f38ba8; }
    .test-line.error { color: #fab387; }
    .test-summary {
      margin-top: 8px;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 13px;
    }
    .test-summary.success {
      background: #a6e3a122;
      color: #a6e3a1;
      border: 1px solid #a6e3a144;
    }
    .test-summary.failure {
      background: #f38ba822;
      color: #f38ba8;
      border: 1px solid #f38ba844;
    }
    .test-summary.forbidden {
      background: #fab38722;
      color: #fab387;
      border: 1px solid #fab38744;
    }
    .unlock-msg {
      margin-top: 6px;
      color: #89b4fa;
      font-size: 12px;
    }

    /* ─── State options bar ──────────────────────────── */
    .state-options {
      display: flex;
      align-items: center;
      padding: 6px 14px;
      background: #181825;
      border-bottom: 1px solid #313244;
    }
    .toggle-option {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      user-select: none;
    }
    .toggle-text {
      font-size: 12px;
      color: #6c7086;
    }
    .toggle-switch {
      position: relative;
      display: inline-block;
      width: 32px;
      height: 18px;
    }
    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .toggle-slider {
      position: absolute;
      inset: 0;
      background: #45475a;
      border-radius: 9px;
      transition: background .2s;
    }
    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 12px;
      height: 12px;
      left: 3px;
      bottom: 3px;
      background: #cdd6f4;
      border-radius: 50%;
      transition: transform .2s;
    }
    .toggle-switch input:checked + .toggle-slider {
      background: #89b4fa;
    }
    .toggle-switch input:checked + .toggle-slider::before {
      transform: translateX(14px);
    }

    /* ─── Tables (registers / memory) ────────────────── */
    .table-block {
      min-height: 0;
      display: flex;
      flex-direction: column;
      border-bottom: 1px solid #313244;
    }
    .table-block.registers { flex: 0 0 auto; }
    .table-block.memory { flex: 1; min-height: 0; }
    .table-block:last-child { border-bottom: none; }
    .table-block h3 {
      margin: 0;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 600;
      background: #181825;
      color: #a6e3a1;
      border-bottom: 1px solid #313244;
    }
    .table-wrap {
      flex: 1;
      overflow: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th, td {
      padding: 8px 12px;
      text-align: left;
      border-bottom: 1px solid #313244;
    }
    th {
      background: #313244;
      color: #bac2de;
      font-weight: 600;
    }
    tr:hover td { background: #31324444; }
    .reg-name { color: #89b4fa; }
    .addr { color: #cba6f7; }
    .value { font-variant-numeric: tabular-nums; color: #f9e2af; }
    td.value[contenteditable="true"]:focus { outline: 1px solid #89b4fa; outline-offset: -1px; }
    .pc-row { background: #45475a55 !important; }
    .pc-row td { border-left: 3px solid #f9e2af; }
    /* ─── Speed slider ─────────────────────────────── */
    .speed-control {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-left: 8px;
    }
    .speed-label {
      font-size: 11px;
      color: #6c7086;
      white-space: nowrap;
    }
    .speed-value {
      font-size: 11px;
      color: #89b4fa;
      min-width: 42px;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }
    #speed-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 90px;
      height: 4px;
      background: #45475a;
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }
    #speed-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #89b4fa;
      cursor: pointer;
      border: none;
    }
    #speed-slider::-moz-range-thumb {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #89b4fa;
      cursor: pointer;
      border: none;
    }
    .panel-editor .toolbar button.stop {
      background: #f38ba8;
      color: #1e1e2e;
    }
    .panel-editor .toolbar button.stop:hover {
      background: #eba0ac;
    }

    .status {
      font-size: 12px;
      color: #6c7086;
      margin-left: auto;
    }
    .status.halted { color: #f38ba8; }
    .status.running { color: #a6e3a1; }
  </style>
</head>
<body>
  <!-- ─── Mode navigation ─────────────────────────────────────── -->
  <nav id="mode-nav">
    <button data-mode="sandbox" class="active">🏖️ Sandbox</button>
    <div class="nav-dropdown" id="nav-dropdown">
      <button type="button" class="nav-dropdown-toggle" id="nav-dropdown-toggle">
        <span id="nav-dropdown-label">Challenges ▾</span>
      </button>
      <div class="nav-dropdown-menu" id="nav-dropdown-menu">
        <!-- Category items generated dynamically by ui.js -->
      </div>
    </div>
  </nav>

  <div id="root">
    <!-- ─── Editor panel ────────────────────────────────────── -->
    <div class="panel-editor">
      <div class="toolbar">
        <div class="mode-toggle" role="group" aria-label="Editor mode">
          <button type="button" id="btn-mode-code" class="active">Code</button>
          <button type="button" id="btn-mode-blocks">Blocks</button>
        </div>
        <button type="button" class="primary" id="btn-run">Run</button>
        <button type="button" id="btn-step">Step</button>
        <button type="button" id="btn-reset">Reset</button>

        <label class="speed-control" id="speed-control">
          <span class="speed-label">Speed</span>
          <input type="range" id="speed-slider" min="0" max="2000" value="500" step="50" />
          <span class="speed-value" id="speed-value">500ms</span>
        </label>
        <span class="status" id="status">Stopped</span>
      </div>
      <div class="editor-area">
        <div class="code-wrap active">
          <div class="monaco-wrap">
            <div id="monaco-editor"></div>
          </div>
        </div>
        <div class="blocks-wrap">
          <div id="blockly-workspace"></div>
        </div>
      </div>
    </div>

    <!-- ─── State panel ─────────────────────────────────────── -->
    <div class="panel-state">
      <!-- Exercise info (hidden in sandbox mode) -->
      <div id="exercise-panel">
        <div class="ex-header">
          <h3 id="ex-title"></h3>
          <div class="ex-goal" id="ex-goal"></div>
        </div>
        <div class="ex-body" id="ex-body"></div>
        <div class="ex-available" id="ex-available"></div>
        <div class="ex-actions">
          <button class="primary" id="btn-panel-test">▶ Test</button>
          <button id="btn-hint">💡 Hint <span class="ex-hint-count" id="hint-count"></span></button>
        </div>
        <div id="ex-hints"></div>
        <div id="test-results"></div>
      </div>

      <div class="state-options">
        <label class="toggle-option" for="chk-reset-on-change">
          <span class="toggle-switch">
            <input type="checkbox" id="chk-reset-on-change" checked />
            <span class="toggle-slider"></span>
          </span>
          <span class="toggle-text">Reset program on edit</span>
        </label>
      </div>

      <div class="table-block registers">
        <h3>Registers</h3>
        <div class="table-wrap">
          <table id="registers-table">
            <thead><tr><th>Registers</th><th>Value</th></tr></thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
      <div class="table-block memory">
        <h3>Memory</h3>
        <div class="table-wrap">
          <table id="memory-table">
            <thead><tr id="memory-thead-row"></tr></thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/blockly@9.3.3/blockly_compressed.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>
  <script src="js/config.js"></script>
  <script src="js/lang.js"></script>
  <script src="js/interpreter.js"></script>
  <script src="js/exercises.js"></script>
  <script src="js/blocks-miniasm.js"></script>
  <script src="js/ui.js"></script>
</body>
</html>
